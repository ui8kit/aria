<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@ui8kit/aria plain example</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="../../dist/all.iife.js"></script>
  </head>
  <body class="p-8">
    <main>
      <h1 class="text-xl mb-4">ui8kit-aria plain</h1>

      <section aria-labelledby="accordion-heading">
        <h2 id="accordion-heading">Accordion</h2>
        <div data-ui8kit="accordion">
          <section data-accordion-item data-state="closed">
            <h3>
              <button
                type="button"
                id="accordion-trigger-1"
                aria-controls="accordion-panel-1"
                data-ui8kit-accordion-trigger
              >
                Section 1
              </button>
            </h3>
            <div
              id="accordion-panel-1"
              role="region"
              aria-labelledby="accordion-trigger-1"
              data-ui8kit-accordion-content
            >
              Panel 1
            </div>
          </section>
        </div>
      </section>

      <section aria-labelledby="tabs-heading">
        <h2 id="tabs-heading">Tabs</h2>
        <div data-ui8kit="tabs" data-tabs-value="one">
          <div role="tablist" aria-label="Sample tabs">
            <button
              type="button"
              id="tab-one"
              role="tab"
              aria-controls="panel-one"
              data-tabs-trigger
              data-tabs-value="one"
            >
              One
            </button>
            <button
              type="button"
              id="tab-two"
              role="tab"
              aria-controls="panel-two"
              data-tabs-trigger
              data-tabs-value="two"
            >
              Two
            </button>
          </div>
          <div id="panel-one" role="tabpanel" aria-labelledby="tab-one" data-tabs-panel data-tabs-value="one">
            A
          </div>
          <div
            id="panel-two"
            role="tabpanel"
            aria-labelledby="tab-two"
            data-tabs-panel
            data-tabs-value="two"
            hidden
          >
            B
          </div>
        </div>
      </section>

      <section aria-labelledby="dialog-heading">
        <h2 id="dialog-heading">Dialog</h2>
        <div
          data-ui8kit="dialog"
          id="dialog-plain"
          role="dialog"
          aria-modal="true"
          aria-labelledby="dialog-title"
          hidden
        >
          <h3 id="dialog-title">Example dialog</h3>
          <p>Dialog</p>
          <button type="button" data-ui8kit-dialog-close>Close</button>
        </div>
        <button
          type="button"
          aria-haspopup="dialog"
          data-ui8kit-dialog-open
          data-ui8kit-dialog-target="dialog-plain"
        >
          Open
        </button>
      </section>
    </main>
  </body>
</html>
