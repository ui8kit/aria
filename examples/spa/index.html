<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@ui8kit/aria spa example</title>
    <script>
      window.__UI8KIT_ARIA_AUTO_INIT__ = false
    </script>
    <script defer src="../../dist/index.iife.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        window.ui8kit?.init(document.getElementById('route-a'))
      })
    </script>
  </head>
  <body>
    <div data-spa-root>
      <div id="route-a" data-ui8kit="switch">
        <button data-switch-control aria-checked="false">Route Toggle</button>
      </div>
    </div>
  </body>
</html>
